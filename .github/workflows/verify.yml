name: Verify build (web Node 20, Functions Node 22)

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  web-build:
    name: Web build
    runs-on: ubuntu-latest
    env:
      # Exercise the same App Check-configured environment used by production
      # deployment without exposing or depending on the real site key.
      VITE_APPCHECK_SITE_KEY: ci-enterprise-verification
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Setup Java 21 for Firebase emulators
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Install dependencies
        run: npm ci --no-audit --no-fund
      - name: Audit production web dependencies
        run: npx --yes npm@11 audit --omit=dev --audit-level=high
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Web tests
        run: npm test
      - name: Production build and safeguards
        run: npm run build:prod
      - name: Verify native release configuration
        run: |
          npm run check:ios-release-config
          npm run check:ios-release-guard
          npm run check:android-release-config
          node scripts/assert-no-native-firebase-auth.mjs
      - name: Verify Firestore rules parity
        run: npm run rules:check
      - name: Verify dist assets exist
        run: node scripts/verify-dist-assets.js
      - name: Install Firestore rules test dependencies
        run: npm ci --prefix tests/rules --no-audit --no-fund
      - name: Firestore rules emulator tests
        run: npx firebase emulators:exec --only firestore --project demo-mbs "npm run test:rules"

  functions-build:
    name: Functions build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            functions/package-lock.json
      - name: Setup Java 21 for Firebase emulators
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Install web and emulator dependencies
        run: npm ci --no-audit --no-fund
      - name: Install dependencies (functions)
        working-directory: functions
        run: npm ci --no-audit --no-fund
      - name: Audit production Functions dependencies
        working-directory: functions
        run: npx --yes npm@11 audit --omit=dev --audit-level=high
      - name: Build and test functions
        working-directory: functions
        run: npm test
      - name: Scan, credit, refund, and account deletion emulator flow
        run: npm run verify:scan
