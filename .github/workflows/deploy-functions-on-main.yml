name: Deploy Firebase production on main

on:
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write

jobs:
  verify-and-deploy:
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: firebase-production
      cancel-in-progress: false
    env:
      VITE_APPCHECK_SITE_KEY: ${{ secrets.VITE_APPCHECK_SITE_KEY }}
      VITE_STRIPE_PUBLISHABLE_KEY: ${{ secrets.VITE_STRIPE_PUBLISHABLE_KEY }}
      VITE_APP_BASE_URL: https://mybodyscanapp.com
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java 21 for Firebase emulators
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Install web deps
        run: npm ci --no-audit --no-fund

      - name: Verify production public configuration
        run: npm run check:production-config

      - name: Verify web release
        run: npm run lint && npm run typecheck && npm test && npm run build:prod && npm run rules:check && node scripts/verify-dist-assets.js

      - name: Install Firestore rules test dependencies
        run: npm ci --prefix tests/rules --no-audit --no-fund

      - name: Verify Firestore rules in emulator
        run: npx firebase emulators:exec --only firestore --project demo-mbs "npm run test:rules"

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Install functions deps
        working-directory: functions
        run: npm ci --no-audit --no-fund

      - name: Build and test functions
        working-directory: functions
        run: npm test

      - name: Verify scan, credit, refund, and account deletion pipeline
        run: npm run verify:scan

      # Keep production ADC out of unit tests and emulators. Firebase Admin v12
      # does not parse the external-account file emitted for Workload Identity
      # when it initializes during tests; deployment tools authenticate below.
      - id: google-auth
        name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          project_id: mybodyscan-f3daf
          workload_identity_provider: projects/157018993008/locations/global/workloadIdentityPools/github-actions/providers/mybodyscan
          service_account: github-mybodyscan-deploy@mybodyscan-f3daf.iam.gserviceaccount.com

      - name: Deploy production in dependency order
        run: |
          npx firebase hosting:clone mybodyscan-f3daf:live "mybodyscan-f3daf:rollback-${GITHUB_SHA:0:7}" --project mybodyscan-f3daf
          npm run storage:cors:apply
          npx firebase deploy --only firestore:indexes --project mybodyscan-f3daf --non-interactive
          npx firebase deploy --only functions --project mybodyscan-f3daf --non-interactive
          npx firebase deploy --only firestore:rules,storage --project mybodyscan-f3daf --non-interactive
          npx firebase deploy --only hosting --project mybodyscan-f3daf --non-interactive
